<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ACRO Warehouse WMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
:root {
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --accent:#2f81f7;--accent-dim:rgba(47,129,247,.12);
  --success:#3fb950;--warn:#d29922;--danger:#f85149;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --radius:6px;--radius-lg:10px;--font:system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;}
.logo{font-size:15px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;}
.logo-tag{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.mode-tabs{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.mode-btn{padding:5px 14px;font-size:12px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s;}
.mode-btn.active{background:var(--accent);color:#fff;}
.sync-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 9px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:var(--success);}
.sync-dot.syncing{background:var(--warn);animation:pulse .8s infinite;}
.sync-dot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#pick-view{padding:1rem 1.25rem;}
.section-head{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:1.25rem 0 .6rem;}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}

.item-tile{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px 14px;cursor:pointer;user-select:none;transition:border-color .12s,background .12s,transform .08s;display:flex;flex-direction:column;gap:4px;position:relative;-webkit-tap-highlight-color:transparent;}
.item-tile:hover{border-color:var(--accent);background:var(--accent-dim);}
.item-tile:active{transform:scale(.95);}
.item-tile.st-low{border-color:rgba(210,153,34,.5);}
.item-tile.st-out{border-color:rgba(248,81,73,.4);opacity:.65;pointer-events:none;}
.tile-sku{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.2px;}
.tile-name{font-size:11px;color:var(--text2);line-height:1.3;}
.tile-dim{font-size:10px;color:var(--text3);}
.tile-qty-wrap{margin-top:auto;padding-top:8px;display:flex;align-items:flex-end;justify-content:space-between;}
.tile-qty{font-size:32px;font-weight:700;line-height:1;}
.tile-qty.ok{color:var(--success);}
.tile-qty.warn{color:var(--warn);}
.tile-qty.out{color:var(--danger);}
.tile-unit{font-size:10px;color:var(--text2);margin-bottom:3px;}
.tile-btn-multi{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.tile-btn-multi:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.tile-flash{animation:flash .3s ease-out;}
@keyframes flash{0%{background:rgba(47,129,247,.3)}100%{background:var(--accent-dim)}}

/* ── UNDO BANNER ── */
.undo-banner{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--accent);color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:200;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}
.undo-bar{width:80px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.undo-fill{height:100%;background:var(--accent);border-radius:2px;transition:width linear;}
.undo-btn{padding:4px 12px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:600;}

/* ── MULTI PANEL ── */
.multi-panel{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;display:flex;align-items:flex-end;justify-content:center;}
.multi-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:1.5rem;width:100%;max-width:440px;}
.multi-title{font-size:16px;font-weight:600;margin-bottom:1rem;}
.multi-qty-row{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
.qty-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font);}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);}
.qty-num{font-size:32px;font-weight:700;flex:1;text-align:center;}
.multi-footer{display:flex;gap:8px;}

/* ── BUTTONS / FORMS ── */
.btn{padding:10px 18px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--text);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--bg3);}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;flex:1;font-weight:600;}
.btn-p:hover{opacity:.88;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-success{color:var(--success);border-color:rgba(63,185,80,.3);}
.btn-success:hover{background:rgba(63,185,80,.1);}
.btn-danger{color:var(--danger);border-color:rgba(248,81,73,.3);}
.btn-danger:hover{background:rgba(248,81,73,.1);}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field label{font-size:11px;color:var(--text2);font-weight:500;}
.field input,.field select{padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── ADMIN ── */
#admin-view{display:none;padding:1rem 1.25rem;}
.admin-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.admin-tab{padding:6px 14px;font-size:12px;border:1px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;color:var(--text2);transition:all .15s;font-family:var(--font);}
.admin-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-bottom:.875rem;}
.card-title{font-size:14px;font-weight:600;margin-bottom:.875rem;display:flex;align-items:center;justify-content:space-between;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1rem;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:5px;}
.metric-val{font-size:24px;font-weight:700;}
.metric-val.warn{color:var(--warn);}
.metric-val.danger{color:var(--danger);}
.metric-val.ok{color:var(--success);}
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;font-size:10px;font-weight:600;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;}
.tbl td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg3);}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;}
.b-ok{background:rgba(63,185,80,.12);color:#3fb950;}
.b-low{background:rgba(210,153,34,.12);color:#d29922;}
.b-out{background:rgba(248,81,73,.12);color:#f85149;}
.b-info{background:rgba(47,129,247,.12);color:#2f81f7;}
.qty-inp{width:62px;padding:5px 7px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);}
.restock-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;cursor:pointer;}
.restock-row:last-child{border-bottom:none;}
.restock-name{flex:1;font-size:13px;min-width:100px;}
.restock-cur{font-size:12px;min-width:55px;}
.alert-warn{padding:9px 12px;border-radius:var(--radius);font-size:12px;background:rgba(210,153,34,.1);color:var(--warn);border:1px solid rgba(210,153,34,.2);margin-bottom:.75rem;line-height:1.5;}
.alert-info{padding:9px 12px;border-radius:var(--radius);font-size:12px;background:rgba(47,129,247,.1);color:#5b9cf6;border:1px solid rgba(47,129,247,.2);margin-bottom:.75rem;line-height:1.5;}
.alert-success{padding:9px 12px;border-radius:var(--radius);font-size:12px;background:rgba(63,185,80,.1);color:var(--success);border:1px solid rgba(63,185,80,.2);margin-bottom:.75rem;line-height:1.5;}
.import-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:2rem;text-align:center;cursor:pointer;transition:border-color .15s;background:var(--bg3);}
.import-zone:hover{border-color:var(--accent);}
.import-zone.drag-over{border-color:var(--accent);background:var(--accent-dim);}
.import-preview{margin-top:1rem;}
.preview-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.preview-row:last-child{border-bottom:none;}
.pr-name{flex:1;font-weight:500;}
.pr-add{color:var(--success);font-weight:700;min-width:50px;}
.pr-skip{color:var(--text3);}
.teams-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.teams-row:last-child{border-bottom:none;}

/* ── PIN ── */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;}
.pin-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:300px;text-align:center;}
.pin-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.pin-sub{font-size:12px;color:var(--text2);margin-bottom:1.25rem;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:1rem;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem;}
.pin-key{padding:14px;font-size:18px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);cursor:pointer;color:var(--text);transition:all .12s;font-family:var(--font);}
.pin-key:hover{background:var(--accent);border-color:var(--accent);}
.pin-key:active{transform:scale(.94);}
.pin-err{font-size:11px;color:var(--danger);height:14px;}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}

/* ── LANG ── */
.lang-btn{padding:5px 12px;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:20px;background:var(--bg3);cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s;letter-spacing:.3px;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
.lang-btn.en{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── SCANNER ── */
.scan-bar{display:flex;align-items:center;gap:10px;padding:.75rem 1.25rem;background:var(--bg2);border-bottom:1px solid var(--border);margin-bottom:0;}
.scan-btn{display:flex;align-items:center;gap:7px;padding:10px 14px;font-size:13px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s;flex-shrink:0;}
.scan-btn:hover{border-color:var(--accent);color:var(--accent);}
.scan-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.scan-manual{flex:1;padding:8px 11px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);}
.scan-manual:focus{outline:none;border-color:var(--accent);}
.scan-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.scan-viewport{position:relative;width:min(320px,90vw);height:min(320px,90vw);}
.scan-video{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-lg);display:block;}
.scan-overlay{position:absolute;inset:0;border-radius:var(--radius-lg);pointer-events:none;}
.scan-corner{position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;border-width:0;}
.sc-tl{top:10px;left:10px;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0;}
.sc-tr{top:10px;right:10px;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0;}
.sc-bl{bottom:10px;left:10px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px;}
.sc-br{bottom:10px;right:10px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0;}
.scan-line{position:absolute;left:14px;right:14px;height:2px;background:var(--accent);opacity:.8;animation:scanline 2s ease-in-out infinite;}
@keyframes scanline{0%,100%{top:14px}50%{top:calc(100% - 16px)}}
.scan-hint{font-size:13px;color:var(--text2);text-align:center;}
.scan-result-flash{position:absolute;inset:0;border-radius:var(--radius-lg);background:rgba(63,185,80,.3);animation:resultflash .4s ease-out forwards;}
@keyframes resultflash{0%{opacity:1}100%{opacity:0}}
.scan-close{padding:10px 28px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font);}
.scan-close:hover{background:var(--border);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">📦 ACRO 包材WMS <span class="logo-tag">v2.3</span></div>
  <div class="topbar-right">
    <div class="mode-tabs">
      <button class="mode-btn active" id="btn-pick" onclick="setMode('pick')">取货</button>
      <button class="mode-btn" id="btn-admin" onclick="enterAdmin()">管理</button>
    </div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button><div class="sync-chip"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">...</span></div>
  </div>
</div>


<!-- Scanner bar -->
<div class="scan-bar" id="scan-bar">
  <button class="scan-btn" id="scan-toggle-btn" onclick="toggleScanner()">
    <span>📷</span><span id="scan-btn-label">扫码取货</span>
  </button>
  <input class="scan-manual" id="scan-manual-input" id="scan-manual-input" placeholder="或输入编号后按 Enter（如 S-13391）" onkeydown="if(event.key==='Enter')handleManualScan(this.value)"/>
</div>

<!-- Scanner modal -->
<div class="scan-modal" id="scan-modal" style="display:none">
  <div class="scan-viewport">
    <video class="scan-video" id="scan-video" playsinline muted></video>
    <canvas id="scan-canvas" style="display:none"></canvas>
    <div class="scan-overlay">
      <div class="scan-corner sc-tl"></div>
      <div class="scan-corner sc-tr"></div>
      <div class="scan-corner sc-bl"></div>
      <div class="scan-corner sc-br"></div>
      <div class="scan-line"></div>
    </div>
    <div id="scan-result-flash" style="display:none" class="scan-result-flash"></div>
  </div>
  <div class="scan-hint" id="scan-hint">将二维码对准框内</div>
  <button class="scan-close" id="scan-close-btn" onclick="closeScanner()">关闭</button>
</div>
<div id="pick-view"></div>
<div id="admin-view" style="display:none;padding:1rem 1.25rem;">
  <div class="admin-tabs">
    <button class="admin-tab active" id="atab-stock" onclick="switchAdminTab('stock')">📊 库存总览</button>
    <button class="admin-tab" id="atab-uline" onclick="switchAdminTab('uline')">📥 ULINE导入</button>
    <button class="admin-tab" id="atab-restock" onclick="switchAdminTab('restock')">✏️ 手动补货</button>
    <button class="admin-tab" id="atab-add" onclick="switchAdminTab('add')">➕ 添加物料</button>
    <button class="admin-tab" id="atab-teams" onclick="switchAdminTab('teams')">🔔 Teams提醒</button>
    <button class="admin-tab" id="atab-log" onclick="switchAdminTab('log')">📜 记录</button>
  </div>
  <div id="admin-content"></div>
</div>

<!-- Multi-take -->
<div id="multi-panel" class="multi-panel" style="display:none" onclick="if(event.target.id==='multi-panel')closeMulti()">
  <div class="multi-box">
    <div class="multi-title" id="multi-title">取多个</div>
    <div class="multi-qty-row">
      <button class="qty-btn" onclick="adjMulti(-5)" style="font-size:13px">−5</button>
      <button class="qty-btn" onclick="adjMulti(-1)">−</button>
      <div class="qty-num" id="multi-qty-num">1</div>
      <button class="qty-btn" onclick="adjMulti(1)">+</button>
      <button class="qty-btn" onclick="adjMulti(5)" style="font-size:13px">+5</button>
    </div>
    <div class="multi-footer">
      <button class="btn" onclick="closeMulti()">取消</button>
      <button class="btn btn-p" onclick="confirmMulti()">确认取货</button>
    </div>
  </div>
</div>

<!-- PIN -->
<div id="pin-overlay" class="pin-overlay" style="display:none">
  <div class="pin-box">
    <div class="pin-title" id="pin-title-txt">🔐 管理员访问</div>
    <div class="pin-sub" id="pin-sub-txt">请输入管理员 PIN 码</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinClear()" style="font-size:11px;color:var(--text2)">清除</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key" onclick="pinBack()" style="font-size:15px">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <button class="btn btn-sm" id="pin-cancel-btn" onclick="closePinModal()" style="width:100%;margin-top:4px">取消</button>
  </div>
</div>

<!-- Undo banner (injected dynamically) -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG — 部署前修改这里
// ══════════════════════════════════════════
var FB_URL    = 'https://acro-warehouse-wms-default-rtdb.firebaseio.com';
var ADMIN_PIN = '1234';   // 修改为实际PIN
var TEAMS_WEBHOOK = '';   // 粘贴Teams Incoming Webhook URL（管理页面也可设置）
var UNDO_SECONDS  = 5;    // 撤销窗口（秒）

// ══════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════
var currentLang = 'zh';

var LANG = {
  zh: {
    title:        'ACRO 包材WMS',
    pick:         '取货',
    admin:        '管理',
    scan:         '扫码取货',
    scanHint:     '或输入编号后按 Enter（如 S-13391）',

var INV=[], LOGS=[];

// FIREBASE
// ══════════════════════════════════════════
var _lastTs=0, _syncTimer=null, _pollTimer=null;

function setSyncStatus(s,m){
  var d=document.getElementById('sync-dot');
  d.className='sync-dot'+(s==='ok'?' ok':s==='syncing'?' syncing':s==='err'?' err':'');
  document.getElementById('sync-label').textContent=m;
}
function loadData(){
  setSyncStatus('syncing',T('syncConn'));
  fetch(FB_URL+'/wh.json')
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(d){
      if(d&&d.inv&&d.inv.length){
        INV=d.inv;
        // logs 在 Firebase 里是 {key: entry} 对象，转回数组并按时间倒序
        LOGS=logsObjToArr(d.logs);
        if(d.teamsWebhook)TEAMS_WEBHOOK=d.teamsWebhook;
      }
      else{INV=JSON.parse(JSON.stringify(DEFAULT_INV));LOGS=[];setTimeout(saveData,1500);}
      renderPickView();
      setSyncStatus('ok',T('syncOk')+hhmmNow());
      startPolling();
    })
    .catch(function(){
      var c=localStorage.getItem('wh_cache');
      if(c){var p=JSON.parse(c);INV=p.inv;LOGS=logsObjToArr(p.logs);if(p.teamsWebhook)TEAMS_WEBHOOK=p.teamsWebhook;}
      else{INV=JSON.parse(JSON.stringify(DEFAULT_INV));LOGS=[];}
      renderPickView();
      setSyncStatus('err',T('syncErr'));
      setTimeout(loadData,20000);
    });
}
// ── Full save（用于补货、入库、设置、删除等管理操作）──
// 这些是管理员单人操作，不存在并发冲突，全量覆盖没问题
function saveData(){
  var ts=Date.now();_lastTs=ts;
  var snap={inv:INV,logs:LOGS,meta:{ts:ts},teamsWebhook:TEAMS_WEBHOOK};
  localStorage.setItem('wh_cache',JSON.stringify(snap));
  setSyncStatus('syncing',T('syncSaving'));
  fetch(FB_URL+'/wh.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(snap)})
    .then(function(r){if(!r.ok)throw new Error(r.status);setSyncStatus('ok',T('syncSaved')+hhmmNow());})
    .catch(function(){setSyncStatus('err',T('syncSaveFail'));});
}
function schedSave(){clearTimeout(_syncTimer);_syncTimer=setTimeout(saveData,800);}

// ── 找 INV 数组中某个 item 的 index（用于构造原子操作路径）──
function getItemIndex(id){
  for(var i=0;i<INV.length;i++){if(INV[i].id===id)return i;}
  return -1;
}

// ── 原子取货：直接在 Firebase 服务器端做 qty - n，不依赖本地读到的值 ──
// 同时附加日志条目（PATCH logs/时间戳键，不覆盖其他人的日志）
function atomicTake(item, qty, onSuccess, onFail){
  var idx = getItemIndex(item.id);
  if(idx === -1){ onFail('item not found'); return; }

  var logKey = 'l'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  var logEntry = {dt:dtNow(), id:item.id, name:item.name, qty:qty, type:'pick'};

  // 两个原子操作打包成一个 PATCH：
  // 1. inv/idx/qty 用 server-side increment 递减
  // 2. logs/唯一key 写入日志（PATCH 不覆盖其他 key）
  var patch = {};
  patch['inv/'+idx+'/qty'] = {'.sv': {increment: -qty}};
  patch['logs/'+logKey] = logEntry;
  patch['meta/ts'] = {'.sv': 'timestamp'};

  setSyncStatus('syncing',T('taking'));
  fetch(FB_URL+'/wh.json', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(patch)
  })
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(result){
    // Firebase 返回更新后的真实值，用服务器值更新本地，保证显示准确
    var serverQty = result && result.inv && result.inv[idx] ? result.inv[idx].qty : item.qty - qty;
    item.qty = serverQty;
    // 同步本地日志（避免轮询前页面看不到自己的记录）
    LOGS.unshift(logEntry);
    if(LOGS.length>1000) LOGS=LOGS.slice(0,1000);
    localStorage.setItem('wh_cache', JSON.stringify({inv:INV,logs:LOGS,meta:{ts:Date.now()},teamsWebhook:TEAMS_WEBHOOK}));
    setSyncStatus('ok',T('syncSaved')+hhmmNow());
    onSuccess(logEntry, serverQty);
  })
  .catch(function(e){
    // Firebase unreachable — save locally and warn, but still count the pick
    setSyncStatus('err',T('syncSaveFail'));
    // Store pending pick in localStorage to reconcile later
    try{
      var pending=JSON.parse(localStorage.getItem('wh_pending')||'[]');
      pending.push({id:item.id,qty:qty,dt:dtNow()});
      localStorage.setItem('wh_pending',JSON.stringify(pending));
    }catch(ex){}
    // Still call success so UI reflects the take — data reconciled on next sync
    var logEntry={dt:dtNow(),id:item.id,name:item.name,qty:qty,type:'pick'};
    LOGS.unshift(logEntry);
    onSuccess(logEntry, item.qty);
  });
}

// ── 原子撤销：increment +qty（同样是服务器端原子操作）──
function atomicUndo(item, qty, originalLogKey, onDone){
  var idx = getItemIndex(item.id);
  if(idx === -1){ onDone(); return; }

  var logKey = 'l'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  var patch = {};
  patch['inv/'+idx+'/qty'] = {'.sv': {increment: qty}};
  patch['logs/'+logKey] = {dt:dtNow(), id:item.id, name:item.name, qty:qty, type:'撤销取货'};
  // 删除原来那条取货日志（Firebase PATCH 里 null = 删除）
  if(originalLogKey) patch['logs/'+originalLogKey] = null;
  patch['meta/ts'] = {'.sv': 'timestamp'};

  fetch(FB_URL+'/wh.json', {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(patch)
  })
  .then(function(r){return r.json();})
  .then(function(result){
    var serverQty = result && result.inv && result.inv[idx] ? result.inv[idx].qty : item.qty + qty;
    item.qty = serverQty;
    LOGS.unshift({dt:dtNow(),id:item.id,name:item.name,qty:qty,type:'撤销取货'});
    localStorage.setItem('wh_cache',JSON.stringify({inv:INV,logs:LOGS,meta:{ts:Date.now()},teamsWebhook:TEAMS_WEBHOOK}));
    setSyncStatus('ok',T('syncSaved')+hhmmNow());
    onDone();
  })
  .catch(function(){
    // 撤销网络失败：本地先回滚显示，下次轮询会纠正
    item.qty += qty;
    onDone();
  });
}
function startPolling(){
  if(_pollTimer)clearInterval(_pollTimer);
  _pollTimer=setInterval(function(){
    fetch(FB_URL+'/wh/meta.json').then(function(r){return r.json();}).then(function(m){
      if(!m)return;
      if((m.ts||0)>_lastTs){
        fetch(FB_URL+'/wh.json').then(function(r){return r.json();}).then(function(d){
          if(!d)return;_lastTs=m.ts;
          INV=d.inv;LOGS=logsObjToArr(d.logs);if(d.teamsWebhook)TEAMS_WEBHOOK=d.teamsWebhook;
          localStorage.setItem('wh_cache',JSON.stringify(d));
          if(currentMode==='pick')renderPickView();else renderAdminContent();
          setSyncStatus('ok',T('syncUpdated')+hhmmNow());
        });
      }
    }).catch(function(){});
  },8000);
}

function getItem(id){for(var i=0;i<INV.length;i++){if(INV[i].id===id)return INV[i];}return null;}
// Firebase PATCH 把 logs 存成 {key:entry} 对象，这里转成本地用的数组，并把 key 存入 _fbKey
function logsObjToArr(logsObj){
  if(!logsObj)return[];
  if(Array.isArray(logsObj))return logsObj; // 兼容旧格式
  var arr=[];
  var keys=Object.keys(logsObj);
  for(var i=0;i<keys.length;i++){
    var entry=logsObj[keys[i]];
    if(entry){entry._fbKey=keys[i];arr.push(entry);}
  }
  // 按 dt 倒序（最新在前）
  arr.sort(function(a,b){return b.dt>a.dt?1:-1;});
  return arr.slice(0,1000);
}
function invSt(item){if(item.qty===0)return'out';if(item.qty<item.low)return'low';return'ok';}
function hhmmNow(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});}
function dtNow(){return new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}

// ── UNDO system ──
var _undoData=null, _undoTimer=null, _undoEl=null, _undoFillTimer=null;

function takeOne(id){
  var item=getItem(id);if(!item||item.qty<=0){toast(T('zeroStock'));return;}
  doTake(item,1);
}
function doTake(item,qty){
  // 乐观更新：立即刷新本地显示，让操作员感觉瞬间响应
  item.qty-=qty;
  var tile=document.getElementById('tile-'+item.id);
  if(tile){tile.classList.add('tile-flash');setTimeout(function(){tile.classList.remove('tile-flash');},300);}
  updateTile(item.id,item);
  // 原子写入：服务器端做递减，多人同时取同一物料不互相覆盖
  atomicTake(item,qty,
    function(logEntry,serverQty){
      // 服务器返回真实值，如与乐观值不同则纠正显示
      if(item.qty!==serverQty){item.qty=serverQty;updateTile(item.id,item);}
      if(item.qty<item.low&&item.qty>=0)maybeAlertTeams(item);
      showUndoBanner(item,qty,logEntry);
    },
    function(err){
      // 写入失败：回滚本地
      item.qty+=qty;updateTile(item.id,item);
      toast(T('netErr'));
    }
  );
}
function showUndoBanner(item,qty,logEntry){
  clearUndoBanner();
  _undoData={item:item,qty:qty,logEntry:logEntry};
  var el=document.createElement('div');
  el.className='undo-banner';
  el.id='undo-banner';
  el.innerHTML='<span>取 '+item.name+' ×'+qty+'  剩余 '+item.qty+'</span>'
    +'<div class="undo-bar"><div class="undo-fill" id="undo-fill" style="width:100%"></div></div>'
    +'<button class="undo-btn" onclick="doUndo()">'+T('undoBtn')+'</button>';
  document.body.appendChild(el);
  _undoEl=el;
  // animate bar
  var start=Date.now(), dur=UNDO_SECONDS*1000;
  _undoFillTimer=setInterval(function(){
    var pct=Math.max(0,100-(Date.now()-start)/dur*100);
    var f=document.getElementById('undo-fill');
    if(f)f.style.width=pct+'%';
    if(pct<=0)clearInterval(_undoFillTimer);
  },50);
  _undoTimer=setTimeout(clearUndoBanner,dur);
}
function clearUndoBanner(){
  clearTimeout(_undoTimer);clearInterval(_undoFillTimer);
  if(_undoEl&&_undoEl.parentNode)_undoEl.parentNode.removeChild(_undoEl);
  _undoEl=null;_undoData=null;
}
function doUndo(){
  if(!_undoData)return;
  var item=_undoData.item,qty=_undoData.qty,logEntry=_undoData.logEntry;
  // 乐观更新
  item.qty+=qty;
  updateTile(item.id,item);
  clearUndoBanner();
  toast(T('undoing'));
  // 原子撤销：服务器端 +qty，同时删掉原始日志条目
  atomicUndo(item,qty,logEntry._fbKey||null,function(){
    updateTile(item.id,item);
    toast(T('undoDone')+item.name+T('undoCur')+item.qty);
  });
}

var ulinePreview=[];
function renderUlineImport(el){
  el.innerHTML='<div class="card"><div class="card-title">📥 从 ULINE 订单导入库存</div>'
    +'<div class="alert-info">'+T('ulineInfo')+'</div>'
    +'<div class="import-zone" id="import-zone" onclick="document.getElementById(\'file-inp\').click()" '
    +'ondragover="event.preventDefault();this.classList.add(\'drag-over\')" '
    +'ondragleave="this.classList.remove(\'drag-over\')" '
    +'ondrop="event.preventDefault();this.classList.remove(\'drag-over\');handleImportFile(event.dataTransfer.files[0])">'
    +'<div style="font-size:28px;margin-bottom:8px">📂</div>'
    +'<div style="font-size:14px;font-weight:600;margin-bottom:4px">'+T('ulineZone')+'</div>'
    +'<div style="font-size:12px;color:var(--text2)">'+T('ulineZoneSub')+'</div>'
    +'</div>'
    +'<input type="file" id="file-inp" accept=".xlsx" style="display:none" onchange="handleImportFile(this.files[0])"/>'
    +'<div id="import-preview"></div></div>';
}
function handleImportFile(file){
  if(!file)return;
  if(!file.name.endsWith('.xlsx')){toast('请选择 .xlsx 文件');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      parseUlineRows(rows);
    }catch(err){toast('文件解析失败：'+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
function parseUlineRows(rows){
  // Find header row: Date | Order # | Category | Model # | Description | Qty | Ext. Price
  var headerIdx=-1,colModel=-1,colQty=-1,colDesc=-1;
  for(var r=0;r<rows.length;r++){
    for(var c=0;c<rows[r].length;c++){
      if(String(rows[r][c]).toLowerCase().indexOf('model')>-1){
        headerIdx=r;colModel=c;
        for(var cc=0;cc<rows[r].length;cc++){
          var h=String(rows[r][cc]).toLowerCase();
          if(h==='qty'||h==='quantity')colQty=cc;
          if(h.indexOf('desc')>-1)colDesc=cc;
        }
        break;
      }
    }
    if(headerIdx>-1)break;
  }
  if(headerIdx===-1){toast('找不到表头，请确认是 ULINE Order History 文件');return;}
  // Parse data rows
  var skuMap={};// sku -> {qty, desc}
  for(var r=headerIdx+1;r<rows.length;r++){
    var row=rows[r];
    var sku=String(row[colModel]||'').trim();
    var qty=parseInt(row[colQty])||0;
    var desc=String(row[colDesc]||'').trim();
    if(!sku||qty<=0)continue;
    if(!skuMap[sku])skuMap[sku]={qty:0,desc:desc};
    skuMap[sku].qty+=qty;
  }
  // Build preview
  var matched=[],unmatched=[];
  for(var sku in skuMap){
    var item=getItem(sku);
    var packInfo=skuMap[sku];
    if(item){
      // Calculate individual units: ULINE qty is in cartons/cases, packUnit tells us how many per carton
      var addQty=packInfo.qty*(item.packUnit||1);
      matched.push({item:item,addQty:addQty,rawQty:packInfo.qty,sku:sku,desc:packInfo.desc});
    } else {
      unmatched.push({sku:sku,qty:skuMap[sku].qty,desc:packInfo.desc});
    }
  }
  ulinePreview={matched:matched,unmatched:unmatched};
  renderImportPreview();
}
function renderImportPreview(){
  var prev=document.getElementById('import-preview');if(!prev)return;
  if(!ulinePreview||(!ulinePreview.matched.length&&!ulinePreview.unmatched.length)){
    prev.innerHTML='<div class="empty">没有找到有效数据</div>';return;
  }
  var html='<div class="import-preview">';
  if(ulinePreview.matched.length){
    html+='<div style="font-size:12px;font-weight:600;color:var(--success);margin:12px 0 8px">✓ 可匹配物料（'+ulinePreview.matched.length+'种）— 将增加以下库存：</div>';
    for(var i=0;i<ulinePreview.matched.length;i++){
      var m=ulinePreview.matched[i];
      html+='<div class="preview-row">'
        +'<div class="pr-name">'+m.item.name+' <span style="color:var(--text2);font-size:10px">'+m.item.desc+'</span></div>'
        +'<div style="font-size:11px;color:var(--text2)">订单:'+m.rawQty+(m.item.packUnit>1?'箱 × '+m.item.packUnit+'个/箱':'')+' </div>'
        +'<div class="pr-add">+'+m.addQty+' '+m.item.unit+'</div>'
        +'</div>';
    }
  }
  if(ulinePreview.unmatched.length){
    html+='<div style="font-size:12px;font-weight:600;color:var(--text2);margin:12px 0 8px">— 未匹配（不在库存中，跳过）</div>';
    for(var i=0;i<ulinePreview.unmatched.length;i++){
      var u=ulinePreview.unmatched[i];
      html+='<div class="preview-row"><div class="pr-name pr-skip">'+u.sku+'</div><div style="font-size:11px;color:var(--text3)">'+u.desc+'</div><div class="pr-skip">×'+u.qty+'</div></div>';
    }
  }
  html+='</div>';
  if(ulinePreview.matched.length){
    html+='<div style="display:flex;gap:8px;margin-top:1rem">'
      +'<button class="btn" onclick="ulinePreview=[];document.getElementById(\'import-preview\').innerHTML=\'\'">取消</button>'
      +'<button class="btn btn-p" onclick="confirmUlineImport()">确认入库 '+ulinePreview.matched.length+' 种物料</button>'
      +'</div>';
  }
  prev.innerHTML=html;
}
function confirmUlineImport(){
  if(!ulinePreview||!ulinePreview.matched.length)return;
  var count=0;
  for(var i=0;i<ulinePreview.matched.length;i++){
    var m=ulinePreview.matched[i];
    m.item.qty+=m.addQty;
    LOGS.unshift({dt:dtNow(),id:m.item.id,name:m.item.name,qty:m.addQty,type:'ULINE入库'});
    count++;
  }
  ulinePreview=[];
  document.getElementById('import-preview').innerHTML='<div class="alert-success">✓ 已入库 '+count+' 种物料</div>';
  schedSave();
  if(currentMode==='pick')renderPickView();
  toast('✓ ULINE 入库完成，共 '+count+' 种');
}

function renderAdminRestock(el){
  var selCnt=Object.keys(restockSel).length;
  var html=(selCnt>0?'<div class="alert-warn" style="display:flex;align-items:center;justify-content:space-between"><span>已选 '+selCnt+' 种物料</span><button class="btn btn-sm btn-p" onclick="doBulkRestock()" style="padding:5px 14px">'+T('btnConfirm')+'</button></div>':'')
    +'<div style="display:flex;gap:8px;margin-bottom:.75rem">'
    +'<button class="btn btn-sm" onclick="selectLowStockItems()">'+T('btnSelLow')+'</button>'
    +'<button class="btn btn-sm" onclick="restockSel={};renderAdminRestock(document.getElementById(\'admin-content\'))">'+T('btnClear')+'</button>'
    +'</div><div class="card" style="padding:.75rem 1rem">';
  for(var i=0;i<INV.length;i++){
    var item=INV[i],st=invSt(item),isSel=!!restockSel[i];
    html+='<div class="restock-row" onclick="toggleRestockSel('+i+')" style="'+(isSel?'background:var(--accent-dim);padding:9px 8px;margin:0 -8px;border-radius:5px;':'')+'cursor:pointer">'
      +'<input type="checkbox" '+(isSel?'checked':'')+' onclick="event.stopPropagation();toggleRestockSel('+i+')" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent);flex-shrink:0"/>'
      +'<div class="restock-name">'+item.name+' <span style="font-size:10px;color:var(--text3)">'+item.desc+'</span></div>'
      +'<div class="restock-cur" style="color:var(--'+(st==='ok'?'text2':st==='low'?'warn':'danger')+')">'+item.qty+' '+tUnit(item.unit)+'</div>'
      +'<span class="badge b-'+st+'">'+(st==='ok'?T('stOk'):st==='low'?T('stLow'):T('stOut'))+'</span>'
      +(isSel?'<input class="qty-inp" type="number" min="1" value="'+(restockSel[i]||item.packUnit||10)+'" id="rs-'+i+'" onclick="event.stopPropagation()" onchange="restockSel['+i+']=Math.max(1,parseInt(this.value)||1)" style="width:65px"/>':'')
      +'</div>';
  }
  el.innerHTML=html+'</div>';
}
function toggleRestockSel(idx){if(restockSel[idx]){delete restockSel[idx];}else{restockSel[idx]=INV[idx].packUnit||10;}renderAdminRestock(document.getElementById('admin-content'));}
function selectLowStockItems(){restockSel={};for(var i=0;i<INV.length;i++){var s=invSt(INV[i]);if(s==='low'||s==='out')restockSel[i]=INV[i].packUnit||10;}renderAdminRestock(document.getElementById('admin-content'));}
function doBulkRestock(){
  var keys=Object.keys(restockSel);if(!keys.length){toast(T('restockNone'));return;}
  for(var i=0;i<keys.length;i++){
    var idx=parseInt(keys[i]),el=document.getElementById('rs-'+idx);
    var add=el?Math.max(1,parseInt(el.value)||restockSel[idx]):restockSel[idx];
    INV[idx].qty+=add;
    LOGS.unshift({dt:dtNow(),id:INV[idx].id,name:INV[idx].name,qty:add,type:'手动入库'});
  }
  restockSel={};toast(T('restockOk'));schedSave();
  renderAdminRestock(document.getElementById('admin-content'));
  if(currentMode==='pick')renderPickView();
}

  var grps=[];for(var i=0;i<INV.length;i++){if(grps.indexOf(INV[i].grp)===-1)grps.push(INV[i].grp);}
  el.innerHTML='<div class="card"><div class="card-title">添加新物料</div>'
    +'<div class="form2"><div class="field"><label>编号/名称 *（如 S-XXXXX 或 自定义）</label><input type="text" id="add-id" placeholder="S-XXXXX"/></div>'
    +'<div class="field"><label>规格描述</label><input type="text" id="add-desc" placeholder="如 12×10×7""/></div></div>'
    +'<div class="form2"><div class="field"><label>分组 *</label>'
    +'<select id="add-grp"><option value="">选择</option>'+grps.map(function(g){return'<option>'+g+'</option>';}).join('')+'<option value="__new__">+ 新分组</option></select></div>'
    +'<div id="add-newgrp-wrap" style="display:none"><div class="field"><label>新分组名</label><input type="text" id="add-newgrp"/></div></div></div>'
    +'<div class="form2"><div class="field"><label>单位</label><input type="text" id="add-unit" value="个"/></div>'
    +'<div class="field"><label>包装单位（1箱=?个，用于ULINE自动计算）</label><input type="number" id="add-pack" min="1" value="1"/></div></div>'
    +'<div class="form2"><div class="field"><label>初始数量</label><input type="number" id="add-qty" min="0" value="0"/></div>'
    +'<div class="field"><label>低库存预警值</label><input type="number" id="add-low" min="1" value="10"/></div></div>'
    +'<button class="btn btn-p" onclick="doAddItem()" style="flex:none">添加物料</button></div>';
  document.getElementById('add-grp').addEventListener('change',function(){
    document.getElementById('add-newgrp-wrap').style.display=this.value==='__new__'?'block':'none';
  });

function doAddItem(){
  var id=(document.getElementById('add-id').value||'').trim();
  var desc=(document.getElementById('add-desc').value||'').trim()||'—';
  var grpSel=document.getElementById('add-grp').value;
  var grp=grpSel==='__new__'?(document.getElementById('add-newgrp').value||'').trim():grpSel;
  var unit=(document.getElementById('add-unit').value||'个').trim();
  var pack=parseInt(document.getElementById('add-pack').value)||1;
  var qty=parseInt(document.getElementById('add-qty').value)||0;
  var low=parseInt(document.getElementById('add-low').value)||10;
  if(!id){toast(T('addErrName'));return;}if(!grp){toast(T('addErrGrp'));return;}
  if(getItem(id)){toast(T('addErrExists'));return;}
  INV.push({id:id,grp:grp,name:id,desc:desc,unit:unit,qty:qty,low:low,packUnit:pack});
  if(qty>0)LOGS.unshift({dt:dtNow(),id:id,name:id,qty:qty,type:'初始入库'});
  toast(T('addOk')+id);schedSave();
  if(currentMode==='pick')renderPickView();
  switchAdminTab('stock');
}

    +'<div class="form2">'
    +'<button class="btn btn-success" onclick="saveTeamsWebhook()">保存 Webhook</button>'

function buildLowStockList(){
  var low=INV.filter(function(x){return invSt(x)!=='ok';});
  if(!low.length)return '<div class="empty">'+T('teamsAllOk')+'</div>';
  var html='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>物料</th><th>库存</th><th>预警值</th><th>状态</th></tr></thead><tbody>';
  for(var i=0;i<low.length;i++){
    var item=low[i],st=invSt(item);
    html+='<tr><td style="font-weight:600">'+item.name+'</td><td>'+item.qty+'</td><td>'+item.low+'</td><td><span class="badge b-'+st+'">'+(st==='low'?'低库存':'缺货')+'</span></td></tr>';
  }
  return html+'</tbody></table></div>';
}
function saveTeamsWebhook(){
  var url=(document.getElementById('teams-url').value||'').trim();
  TEAMS_WEBHOOK=url;schedSave();toast(url?T('teamsSaved'):T('teamsCleared'));
}
function testTeamsWebhook(){
  var url=(document.getElementById('teams-url').value||'').trim();
  if(!url){toast('请先填写 Webhook URL');return;}
  sendTeamsMessage(url,T('teamsTestMsg'),function(ok){
    toast(ok?T('teamsTestOk'):T('teamsTestFail'));
  });
}

var _teamsAlerted={};// prevent spam within same session
function maybeAlertTeams(item){
  if(!TEAMS_WEBHOOK)return;
  var key=item.id+'-'+Math.floor(Date.now()/60000);// once per minute per item
  if(_teamsAlerted[key])return;
  _teamsAlerted[key]=true;
  var st=invSt(item);
  var emoji=st==='out'?'🔴':'🟡';
  var msg=T('teamsAlertMsg')(item);
  sendTeamsMessage(TEAMS_WEBHOOK,msg,function(){});
}
function sendTeamsMessage(url,text,cb){
  fetch(url,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text})
  }).then(function(r){cb(r.ok);}).catch(function(){cb(false);});
}

// ══════════════════════════════════════════
// SCANNER
// ══════════════════════════════════════════
var _scanStream=null, _scanRaf=null, _lastScannedCode='', _lastScannedTime=0;
var SCAN_SAME_CODE_COOLDOWN=1500; // 同一个码1.5秒内不重复触发

function toggleScanner(){
  var modal=document.getElementById('scan-modal');
  if(modal.style.display==='flex'){closeScanner();}
  else{openScanner();}
}

function openScanner(){
  var modal=document.getElementById('scan-modal');
  var btn=document.getElementById('scan-toggle-btn');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('⚠ 此设备不支持摄像头扫码，请使用手动输入');return;
  }
  modal.style.display='flex';
  btn.classList.add('active');
  document.getElementById('scan-hint').textContent=T('scanStart');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(function(stream){
      _scanStream=stream;
      var video=document.getElementById('scan-video');
      video.srcObject=stream;
      video.play();
      video.onloadedmetadata=function(){
        document.getElementById('scan-hint').textContent=T('scanAim');
        _scanRaf=requestAnimationFrame(scanFrame);
      };
    })
    .catch(function(e){
      document.getElementById('scan-hint').textContent=T('scanNoCamera')+': '+e.message;
    });
}

function closeScanner(){
  if(_scanRaf){cancelAnimationFrame(_scanRaf);_scanRaf=null;}
  if(_scanStream){_scanStream.getTracks().forEach(function(t){t.stop();});_scanStream=null;}
  document.getElementById('scan-modal').style.display='none';
  document.getElementById('scan-toggle-btn').classList.remove('active');
}

function scanFrame(){
  var video=document.getElementById('scan-video');
  var canvas=document.getElementById('scan-canvas');
  if(!video||!canvas||video.readyState<2){_scanRaf=requestAnimationFrame(scanFrame);return;}
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  var imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  var code=null;
  if(typeof jsQR==='function'){
    code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
  }
  if(code&&code.data){
    var now=Date.now();
    // 同一个码：冷却期内忽略（防止同一张二维码被连续触发）
    // 不同的码：立即响应（操作员连续扫不同箱子不受影响）
    var sameCode=(code.data===_lastScannedCode);
    var inCooldown=(now-_lastScannedTime<SCAN_SAME_CODE_COOLDOWN);
    if(!sameCode||!inCooldown){
      onCodeScanned(code.data);
    }
  }
  _scanRaf=requestAnimationFrame(scanFrame);
}

function onCodeScanned(raw){
  var code=raw.trim().toUpperCase();
  // 支持纯编号（S-13391）或带前缀的URL（?take=S-13391）
  var match=code.match(/(?:TAKE=)?([A-Z0-9][A-Z0-9-]+)/);
  if(!match)return;
  var itemId=match[1];
  // 也尝试原始大小写
  var item=getItem(itemId)||getItem(raw.trim());
  if(!item){
    document.getElementById('scan-hint').textContent=T('scanNoItem')+raw.trim()+T('scanCheck');
    return;
  }
  // 记录本次扫码，用于同码冷却判断
  _lastScannedCode=raw.trim();
  _lastScannedTime=Date.now();
  // 视觉反馈
  var flash=document.getElementById('scan-result-flash');
  flash.style.display='block';
  setTimeout(function(){flash.style.display='none';},400);
  document.getElementById('scan-hint').textContent='✓ '+item.name+'  '+T('scanNext');
  setTimeout(function(){
    document.getElementById('scan-hint').textContent=T('scanAim');
  },1000);
  // 取货（扫码默认取1个，符合操作员逐箱扫的习惯）
  if(item.qty<=0){toast('⚠ '+item.name+' 库存为零');return;}
  doTake(item,1);
}

function handleManualScan(val){
  val=(val||'').trim();
  if(!val)return;
  var item=getItem(val)||getItem(val.toUpperCase());
  if(!item){toast(T('scanNoItem')+val);return;}
  if(item.qty<=0){toast('⚠ '+item.name+' 库存为零');return;}
  doTake(item,1);
  document.getElementById('scan-manual-input').value='';
  document.getElementById('scan-manual-input').focus();
  // 高亮对应tile
  var tile=document.getElementById('tile-'+item.id);
  if(tile){tile.scrollIntoView({behavior:'smooth',block:'center'});}
}
